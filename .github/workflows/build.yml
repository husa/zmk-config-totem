on: [push, pull_request, workflow_dispatch]

jobs:
  build:
    uses: zmkfirmware/zmk/.github/workflows/build-user-config.yml@main

  release:
    needs: build
    if: github.ref == 'refs/heads/master' && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: firmware
          path: firmware

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Draw keymap
        run: |
          sudo apt-get update && sudo apt-get install -y librsvg2-bin
          pip install keymap-drawer
          keymap parse -z config/totem.keymap > keymap.yaml
          keymap draw keymap.yaml > keymap.svg
          rsvg-convert -z 2 keymap.svg -o keymap.png

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          DATETIME=$(date -u +'%Y-%m-%d %H:%M UTC')
          gh release create "build-${{ github.run_number }}" \
            firmware/*.uf2 keymap.png keymap.svg keymap.yaml \
            --target "$GITHUB_SHA" \
            --title "$DATETIME - Build ${{ github.run_number }}" \
            --notes "TOTEM firmware and keymap image, built from \`$GITHUB_SHA\`."
